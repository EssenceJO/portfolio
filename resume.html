<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Essence Ochoa | Resume</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: #0f0f0f;
      color: #f5f5f5;
      padding: 40px;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 50px;
      flex-wrap: wrap;
      gap: 20px;
    }

    .logo {
      font-size: 1.3rem;
      font-weight: bold;
      letter-spacing: 1px;
    }

    nav {
      display: flex;
      gap: 20px;
    }

    nav a {
      opacity: 0.8;
      transition: opacity 0.2s ease;
    }

    nav a:hover {
      opacity: 1;
    }

    .resume-section h1 {
      font-size: clamp(2rem, 5vw, 4rem);
      margin-bottom: 16px;
    }

    .resume-section p {
      color: #b0b0b0;
      margin-bottom: 30px;
    }

    .resume-container {
      width: 100%;
      height: 85vh;
      border: 1px solid #2d2d2d;
      border-radius: 16px;
      overflow: hidden;
      background-color: #1b1b1b;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .download-btn {
      display: inline-block;
      margin-bottom: 24px;
      padding: 12px 20px;
      background-color: #f5f5f5;
      color: #111;
      border-radius: 10px;
      font-weight: bold;
      transition: opacity 0.2s ease;
    }

    .download-btn:hover {
      opacity: 0.85;
    }

    @media (max-width: 600px) {
      body {
        padding: 24px;
      }

      .resume-container {
        height: 75vh;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <div class="logo">Essence Ochoa</div>

      <nav>
        <a href="index.html">Projects</a>
        <a href="resume.html">Resume</a>
        <a href="https://github.com/EssenceJO" target="_blank">GitHub</a>
        <a href="https://www.linkedin.com/in/essence-ochoa-04374a287/" target="_blank">LinkedIn</a>
      </nav>
    </header>

    <section class="resume-section">
      <h1>Resume</h1>

      <p>
        View or download my resume below.
      </p>

      <!-- Replace with your actual resume PDF filename -->
      <a class="download-btn" href="Essence Ochoa Resume.pdf" target="_blank">
        Download Resume
      </a>

      <div class="resume-container">
        <!-- Replace resume.pdf with your resume file -->
        <iframe src="Essence Ochoa Resume.pdf"></iframe>
      </div>
    </section>

  </div>
